<div class="container-fluid mt-1">

    <!-- Filter Group Card -->
    <div class="card shadow mb-4">
      <div class="card-header py-3">
        <h5 class="mb-0 fw-semibold">Search Filters</h5>
      </div>
      <div class="card-body">
        <form id="searchForm" name="searchForm"
              class="row gy-3 gx-3 align-items-end" novalidate>
          <!-- Filter by Name -->
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="filter_name"
                  class="form-label visually-hidden">Name</label>
            <input type="text" class="form-control" id="filter_name"
                  name="filter_name" placeholder="Filter by Name">
          </div>
          <!-- Filter by ID -->
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="filter_id"
                  class="form-label visually-hidden">ID</label>
            <input type="text" class="form-control" id="filter_id"
                  name="filter_id" placeholder="Filter by ID">
          </div>
          <!-- Filter by Region (dropdown) -->
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="filter_region"
                  class="form-label visually-hidden">* Region</label>
            <select class="form-select" id="filter_region"
                    name="filter_region" required>
              
            </select>
          </div>

          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="filter_location" class="form-label  visually-hidden">Location</label>
            <select class="form-select" id="filter_location" name="filter_location" >
                
                <option id='filtloc'  value="" selected>Select Location </option>
                <!-- Options will be populated by JavaScript -->
            </select>
          </div>

          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="filter_hub" class="form-label  visually-hidden">Hub</label>
            <select class="form-select" id="filter_hub" name="filter_hub" >
                
                <option id='filthub'  value="" selected>Select Hub / DC</option>
                <!-- Options will be populated by JavaScript -->
            </select>
          </div>


          <!-- Filter by Position (dropdown) -->
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="filter_position"
                  class="form-label visually-hidden">* Position</label>
            <select class="form-select" id="filter_position"
                    name="filter_position" required>
                    <option value="01">RIDER</option>
              <option value="02">TRANSPORTER</option>
              <option value="04">SORTER/BACKROOM</option>
              <option value="10">TEAM LEADER</option>
              
              <!-- <option value="08">COORDINATOR</option> -->
            </select>
          </div>

          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="filter_date_from" class="form-label">Date From</label>
            <input type="date" class="form-control" id="filter_date_from"
                  name="filter_date_from">
          </div>
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="filter_date_to" class="form-label">Date To</label>
            <input type="date" class="form-control" id="filter_date_to"
                  name="filter_date_to">
          </div>

          <!-- Action select -->
          
           <div class="col-12 col-sm-6 col-md-4 col-lg-auto ms-auto">
              <div class="action-wrapper">
                  <select id="actionSelect" class="form-select modern-action-select">
                      <option value="" disabled selected>⚡ Quick Actions</option>
                      <option value="search">🔍 Search Record</option>
                      <option value="timekeeping" id="optTimekeeping">📅 View Timekeeping</option>
                  </select>
                  <!-- Custom arrow for better look -->
                  <i class="bi bi-chevron-down select-icon"></i>
              </div>
          </div>


        </form>
      </div>
    </div>

    <!-- Main Content Card (Search Result) -->
    <div class="row gx-2">
      <div class="col-12 mb-3 mb-lg-0 d-none" id="search-result-grid">
        <div class="card shadow w-100">
          <div class="card-body p-2">

            <!-- GRID inside -->
            <div class="table-responsive d-none" id="hrisdisplay">
              <div id="hrisgrid">
                <!-- Your grid will be initialized here -->
              </div>
            </div>

            <!-- GRID inside -->
            <div class="table-responsive d-none" id="timekeepdisplay">
              <div class="card-header py-3">
                <h5 class="mb-0 fw-semibold">TimeKeeping</h5><br>
              </div>

              <div class="mb-2">
                <button type="button"
                        class="btn btn-success btn-sm"
                        id="downloadTimekeepBtn"
                        disabled
                        onclick="hris.downloadTimekeepXls();">
                  <i class="ti ti-file-type-xls me-1"></i>
                  Download Timekeeping
                </button>
              </div>

              <div id="timekeepgrid">
                <!-- Your grid will be initialized here -->
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

</div> <!-- /container-fluid -->
