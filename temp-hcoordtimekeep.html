<div class="container-fluid mt-1">

    <!-- Filter Group Card -->
    <div class="card shadow mb-4">
      <div class="card-header py-3">
        <h5 class="mb-0 fw-semibold">Search Filters</h5>
      </div>
      <div class="card-body">
        <form id="filter-searchForm" name="filter-searchForm"
              class="row gy-3 gx-3 align-items-end" novalidate>
          <!-- Filter by Name -->
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="xfilter_name"
                  class="form-label visually-hidden">Name</label>
            <input type="text" class="form-control" id="xfilter_name"
                  name="xfilter_name" placeholder="Filter by Name">
          </div>
          <!-- Filter by ID -->
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="xfilter_id"
                  class="form-label visually-hidden">ID</label>
            <input type="text" class="form-control" id="xfilter_id"
                  name="xfilter_id" placeholder="Filter by ID">
          </div>
          <!-- Filter by Region (dropdown) -->
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="xfilter_region"
                  class="form-label visually-hidden">* Region</label>
            <select class="form-select" id="xfilter_region"
                    name="xfilter_region" required>
              <option value="" disabled selected>Filter by Region</option>
              <option value="cmnl">NCR-CMNLA</option>
              <option value="cmnva">NCR-CMNVA</option>
              <option value="smnl">NCR-SMNL</option>
              <option value="nelu">LUZ-NEL</option>
              <option value="nwlu">LUZ-NWL</option>
              <option value="min">MIN</option>
              <option value="bicol">BSL-BICOL</option>
              <option value="smarleyte">BSL-SAMAR LEYTE</option>
              <option value="bacolod">WVIS-BACOLOD</option>
              <option value="panay">WVIS-PANAY</option>
              <option value="central">WVIS-CENTRAL</option>
              
            </select>
          </div>

           <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="xfilter_location" class="form-label  visually-hidden">Location</label>
            <select class="form-select" id="xfilter_location" name="xfilter_location" >
                
                <option id='filtloc'  value="" selected>Select Location </option>
                <!-- Options will be populated by JavaScript -->
            </select>
          </div>
                <!-- Filter by Position (dropdown) -->
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="xfilter_position"
                  class="form-label visually-hidden">* Position</label>
            <select class="form-select" id="xfilter_position"
                    name="xfilter_position" required>
              <option value="" disabled selected>Filter by Position</option>
              <option value="01" >Rider</option>
              <option value="04">Sorter/BackRoom</option>
              <option value="02">Transporter</option>
              <option value="10">Team Leader</option>
              <option value="06">Time Keeper</option>
              <option value="03">Foot Delivery</option>
              <option value="15">3 Wheel</option>
              <option value="17">4 Wheel</option>
              
            </select>
          </div>


          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="xfilter_hub" class="form-label  visually-hidden">Hub</label>
            <select class="form-select" id="xfilter_hub" name="xfilter_hub" >
                
                <option id='filthub' value="" disabled selected>Select Hub / DC </option>
                <!-- Options will be populated by JavaScript -->
            </select>
          </div>

    
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="xfilter_date_from" class="form-label">Date From</label>
            <input type="date" class="form-control" id="xfilter_date_from"
                  name="xfilter_date_from" disabled>
          </div>
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label for="xfilter_date_to" class="form-label">Date To</label>
            <input type="date" class="form-control" id="xfilter_date_to"
                  name="xfilter_date_to" disabled>
          </div>

          <!-- Action select -->
          

            <div class="col-12 col-sm-6 col-md-4 col-lg-auto ms-auto">
                <div class="action-wrapper">
                    <select id="filter-actionSelect" class="form-select modern-action-select">
                        <option value="" disabled selected>⚡ Quick Actions</option>
                        <option value="search">🔍 Search Record</option>
                        <option value="timekeeping" id="optTimekeeping">📅 View Timekeeping</option>
                        <option value="masterfile" id="optMasterfile">💾 Download Masterfile</option>
                    </select>
                    <!-- Custom arrow for better look -->
                    <i class="bi bi-chevron-down select-icon"></i>
                </div>
            </div>

        </form>
      </div>
    </div>

    <!-- Main Content Card (Search Result) -->
    <div class="row gx-2">
      <div class="col-12 mb-3 mb-lg-0 d-none" id="search-result-grid">
        <div class="card shadow w-100">
          <div class="card-body p-2">

            <!-- GRID inside -->
            <div class="table-responsive d-none" id="hrisdisplay">
              <div id="hrisgrid">hrisgrid
                <!-- Your grid will be initialized here -->
              </div>
            </div>

            <!-- GRID inside -->
            <div class="table-responsive d-none" id="timekeepdisplay">
              <div class="card-header py-3">
                <h5 class="mb-0 fw-semibold">TimeKeeping</h5><br>
              </div>

              <div class="mb-2">
                <button type="button"
                        class="btn btn-success btn-sm"
                        id="downloadTimekeepBtn"
                        disabled
                        onclick="hris.downloadTimekeepXls();">
                  <i class="ti ti-file-type-xls me-1"></i>
                  Download Timekeeping
                </button>
              </div>

              <div id="timekeepgrid">
                <!-- Your grid will be initialized here -->
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

</div> <!-- /container-fluid -->
