<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Page</title>
</head>
<body>
<div id="msg"></div>
    
<script>
    document.addEventListener("DOMContentLoaded", function() {
        
        const msgElement = document.getElementById('msg');
        msgElement.innerHTML = "Trying to Reset Your Profile...";

        // 1. Force clear EVERYTHING to test
        window.localStorage.clear(); 
        
        // 2. Double check specific keys just in case
        window.localStorage.removeItem('profile');
        window.localStorage.removeItem('myCart');

        // 3. Verify immediately in console
        console.log('Cart after delete:', window.localStorage.getItem('myCart')); 
        console.log('Profile after delete:', window.localStorage.getItem('profile'));

        msgElement.innerHTML = "Your Profile has been Reset...Redirecting";

        // 4. Use a small timeout to ensure the UI updates before the alert freezes the thread
        setTimeout(function() {
            //alert('YOUR FILE HAS BEEN RESET. PRESS OK TO CONTINUE.');
            
            // 5. Hard reload to the destination to ensure cache is cleared too
            window.location.replace("/jtx"); 
        }, 2000);
    });
</script>

</body>
</html>
